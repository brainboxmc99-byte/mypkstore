openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: MyPkStore API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: admin
  - name: auth
  - name: shop
  - name: store

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Platform overview stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/shops:
    get:
      operationId: listAdminShops
      tags: [admin]
      summary: List all shops
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shop"
    post:
      operationId: createShop
      tags: [admin]
      summary: Create a new shop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

  /admin/shops/{id}:
    patch:
      operationId: updateShop
      tags: [admin]
      summary: Update shop plan or status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"
    delete:
      operationId: deleteShop
      tags: [admin]
      summary: Delete a shop
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/shops/{id}/token:
    post:
      operationId: generateToken
      tags: [admin]
      summary: Generate magic link token for shop
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Token generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginToken"

  /admin/shops/{id}/permanent-token:
    post:
      operationId: generatePermanentToken
      tags: [admin]
      summary: Generate or retrieve permanent login link for shop
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Permanent link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermanentTokenResponse"

  /plans:
    get:
      operationId: listPublicPlans
      tags: [store]
      summary: List all subscription plans (public)
      responses:
        "200":
          description: Plans list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Get platform settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"
    patch:
      operationId: updateAdminSettings
      tags: [admin]
      summary: Update platform settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformSettingsUpdate"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"

  /admin/plans:
    get:
      operationId: listPlans
      tags: [admin]
      summary: List all subscription plans
      responses:
        "200":
          description: Plans list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  /admin/plans/{id}:
    patch:
      operationId: updatePlan
      tags: [admin]
      summary: Update plan price or limits
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"

  /auth/login:
    post:
      operationId: loginWithToken
      tags: [auth]
      summary: Login with magic link token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid or expired token

  /auth/admin:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login with password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginInput"
      responses:
        "200":
          description: Admin login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current session info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Not authenticated

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /shop/me:
    get:
      operationId: getMyShop
      tags: [shop]
      summary: Get own shop profile
      responses:
        "200":
          description: Shop
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"
    patch:
      operationId: updateMyShop
      tags: [shop]
      summary: Update shop settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopSettings"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shop"

  /shop/stats:
    get:
      operationId: getShopStats
      tags: [shop]
      summary: Shop owner dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopStats"

  /shop/products:
    get:
      operationId: listMyProducts
      tags: [shop]
      summary: List own products
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [shop]
      summary: Add a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /shop/products/{id}:
    patch:
      operationId: updateProduct
      tags: [shop]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [shop]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /shop/orders:
    get:
      operationId: listMyOrders
      tags: [shop]
      summary: List orders for own shop
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /shop/orders/{id}:
    delete:
      operationId: deleteOrder
      tags: [shop]
      summary: Delete an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [shop]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /stores/{slug}:
    get:
      operationId: getPublicStore
      tags: [store]
      summary: Get public store info
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStore"
        "404":
          description: Store not found

  /stores/{slug}/products:
    get:
      operationId: listPublicProducts
      tags: [store]
      summary: List products for a public store
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /stores/{slug}/orders:
    post:
      operationId: submitOrder
      tags: [store]
      summary: Customer submits a WhatsApp order
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Shop:
      type: object
      required: [id, ownerName, shopName, slug, plan, status, whatsapp, createdAt]
      properties:
        id:
          type: integer
        ownerName:
          type: string
        shopName:
          type: string
        slug:
          type: string
        plan:
          type: string
        status:
          type: string
        whatsapp:
          type: string
        tagline:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        brandColor:
          type: ["string", "null"]
        footerText:
          type: ["string", "null"]
        footerAddress:
          type: ["string", "null"]
        footerPhone:
          type: ["string", "null"]
        footerEmail:
          type: ["string", "null"]
        privacyPolicy:
          type: ["string", "null"]
        shippingPolicy:
          type: ["string", "null"]
        returnPolicy:
          type: ["string", "null"]
        facebookUrl:
          type: ["string", "null"]
        instagramUrl:
          type: ["string", "null"]
        twitterUrl:
          type: ["string", "null"]
        youtubeUrl:
          type: ["string", "null"]
        paymentMethods:
          type: ["string", "null"]
        subscriptionStartDate:
          type: ["string", "null"]
        subscriptionExpiryDate:
          type: ["string", "null"]
        permanentToken:
          type: ["string", "null"]
        createdAt:
          type: string

    ShopInput:
      type: object
      required: [ownerName, shopName, slug, whatsapp]
      properties:
        ownerName:
          type: string
        shopName:
          type: string
        slug:
          type: string
        whatsapp:
          type: string
        plan:
          type: string

    ShopUpdate:
      type: object
      properties:
        shopName:
          type: string
        ownerName:
          type: string
        whatsapp:
          type: string
        plan:
          type: string
        status:
          type: string
        subscriptionStartDate:
          type: ["string", "null"]
        subscriptionExpiryDate:
          type: ["string", "null"]

    ShopSettings:
      type: object
      properties:
        shopName:
          type: string
        tagline:
          type: string
        whatsapp:
          type: string
        logoUrl:
          type: string
        bannerUrl:
          type: string
        brandColor:
          type: string
        footerText:
          type: string
        footerAddress:
          type: string
        footerPhone:
          type: string
        footerEmail:
          type: string
        privacyPolicy:
          type: string
        shippingPolicy:
          type: string
        returnPolicy:
          type: string
        facebookUrl:
          type: string
        instagramUrl:
          type: string
        twitterUrl:
          type: string
        youtubeUrl:
          type: string
        paymentMethods:
          type: string

    Plan:
      type: object
      required: [id, name, price, productLimit, features]
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: integer
        comparePrice:
          type: ["integer", "null"]
        productLimit:
          type: ["integer", "null"]
        features:
          type: string

    PlanUpdate:
      type: object
      properties:
        price:
          type: integer
        comparePrice:
          type: ["integer", "null"]
        productLimit:
          type: ["integer", "null"]
        features:
          type: string

    LoginToken:
      type: object
      required: [token, shopId, magicLink]
      properties:
        token:
          type: string
        shopId:
          type: integer
        magicLink:
          type: string

    PermanentTokenResponse:
      type: object
      required: [token, shopId, permanentLink]
      properties:
        token:
          type: string
        shopId:
          type: integer
        permanentLink:
          type: string

    LoginInput:
      type: object
      required: [token]
      properties:
        token:
          type: string

    AdminLoginInput:
      type: object
      required: [password]
      properties:
        password:
          type: string

    AuthResult:
      type: object
      required: [role]
      properties:
        role:
          type: string
        shopId:
          type: ["integer", "null"]
        shop:
          $ref: "#/components/schemas/Shop"

    Product:
      type: object
      required: [id, shopId, name, price, stock, createdAt]
      properties:
        id:
          type: integer
        shopId:
          type: integer
        name:
          type: string
        price:
          type: integer
        stock:
          type: integer
        category:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        variants:
          type: ["string", "null"]
        createdAt:
          type: string

    ProductInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
        price:
          type: integer
        stock:
          type: integer
        category:
          type: string
        imageUrl:
          type: string
        variants:
          type: string

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        price:
          type: integer
        stock:
          type: integer
        category:
          type: string
        imageUrl:
          type: string
        variants:
          type: string

    Order:
      type: object
      required: [id, shopId, customerName, productName, total, status, createdAt]
      properties:
        id:
          type: integer
        shopId:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        productName:
          type: string
        note:
          type: ["string", "null"]
        total:
          type: integer
        status:
          type: string
        createdAt:
          type: string

    OrderInput:
      type: object
      required: [customerName, productName]
      properties:
        customerName:
          type: string
        customerPhone:
          type: string
        address:
          type: string
        productName:
          type: string
        note:
          type: string
        total:
          type: integer

    OrderUpdate:
      type: object
      properties:
        status:
          type: string

    PlatformSettings:
      type: object
      required: [whatsappNumber]
      properties:
        whatsappNumber:
          type: string
        contactEmail:
          type: ["string", "null"]
        contactAddress:
          type: ["string", "null"]
        contactPhone:
          type: ["string", "null"]
        privacyPolicy:
          type: ["string", "null"]
        shippingPolicy:
          type: ["string", "null"]
        returnPolicy:
          type: ["string", "null"]
        facebookUrl:
          type: ["string", "null"]
        instagramUrl:
          type: ["string", "null"]
        twitterUrl:
          type: ["string", "null"]
        youtubeUrl:
          type: ["string", "null"]
        paymentMethods:
          type: ["string", "null"]

    PlatformSettingsUpdate:
      type: object
      properties:
        whatsappNumber:
          type: string
        contactEmail:
          type: string
        contactAddress:
          type: string
        contactPhone:
          type: string
        privacyPolicy:
          type: string
        shippingPolicy:
          type: string
        returnPolicy:
          type: string
        facebookUrl:
          type: string
        instagramUrl:
          type: string
        twitterUrl:
          type: string
        youtubeUrl:
          type: string
        paymentMethods:
          type: string

    AdminStats:
      type: object
      required: [totalShops, activeShops, ordersToday, totalRevenue, slotsFree]
      properties:
        totalShops:
          type: integer
        activeShops:
          type: integer
        ordersToday:
          type: integer
        totalRevenue:
          type: integer
        slotsFree:
          type: integer
        basicCount:
          type: integer
        proCount:
          type: integer
        businessCount:
          type: integer

    ShopStats:
      type: object
      required: [totalProducts, ordersToday, revenueThisMonth, lowStockCount]
      properties:
        totalProducts:
          type: integer
        ordersToday:
          type: integer
        revenueThisMonth:
          type: integer
        lowStockCount:
          type: integer
        pendingOrders:
          type: integer
        productLimit:
          type: ["integer", "null"]

    PublicStore:
      type: object
      required: [id, shopName, slug, whatsapp]
      properties:
        id:
          type: integer
        shopName:
          type: string
        slug:
          type: string
        whatsapp:
          type: string
        tagline:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        brandColor:
          type: ["string", "null"]
        footerText:
          type: ["string", "null"]
        footerAddress:
          type: ["string", "null"]
        footerPhone:
          type: ["string", "null"]
        footerEmail:
          type: ["string", "null"]
        privacyPolicy:
          type: ["string", "null"]
        shippingPolicy:
          type: ["string", "null"]
        returnPolicy:
          type: ["string", "null"]
        facebookUrl:
          type: ["string", "null"]
        instagramUrl:
          type: ["string", "null"]
        twitterUrl:
          type: ["string", "null"]
        youtubeUrl:
          type: ["string", "null"]
        paymentMethods:
          type: ["string", "null"]
